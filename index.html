<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Squad Tracker - LIVE DB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --gold: #f0b429;
            --lightning: #e0e0e0; --loki: #38bdf8; --hoff: #4ade80;
            --nibbz: #fb7185; --blankface: #fbbf24; --iziard: #a78bfa;
        }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; max-width: 1100px; padding-bottom: 50px; }
        .cell { 
            width: 100px; height: 130px; background: var(--card); border: 1px solid #30363d;
            position: relative; display: flex; flex-direction: column; border-radius: 4px; overflow: hidden;
        }
        .img-box { width: 100%; height: 90px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .blueprint-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .id-label { position: absolute; top: 2px; left: 4px; font-size: 10px; opacity: 0.5; color: white; }
        
        .item-label { height: 40px; background: #21262d; font-size: 9px; display: flex; align-items: center; justify-content: center; text-align: center; border-top: 1px solid #30363d; padding: 0 4px; }

        .dots { position: absolute; bottom: 42px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #000; border: 1px solid #30363d; cursor: pointer; transition: 0.2s; }
        .dot:hover { transform: scale(1.4); border-color: white; }

        .dot.active.lightning { background: var(--lightning); box-shadow: 0 0 5px var(--lightning); }
        .dot.active.loki { background: var(--loki); box-shadow: 0 0 5px var(--loki); }
        .dot.active.hoff { background: var(--hoff); box-shadow: 0 0 5px var(--hoff); }
        .dot.active.nibbz { background: var(--nibbz); box-shadow: 0 0 5px var(--nibbz); }
        .dot.active.blankface { background: var(--blankface); box-shadow: 0 0 5px var(--blankface); }
        .dot.active.iziard { background: var(--iziard); box-shadow: 0 0 5px var(--iziard); }
    </style>
</head>
<body>
    <h1 style="color:var(--gold)">LIVE SQUAD TRACKER</h1>
    <div class="grid" id="mainGrid">Syncing with database...</div>

    <script>
        // Replace these with your actual Supabase credentials
        const SUPABASE_URL = 'https://atxlgwfsgneoymcazyzy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Lf_Grwcf8_uGf5Uiwm6Y4A_ZIPChWbN';
        
        // Initialize the client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const friends = ["lightning", "loki", "hoff", "nibbz", "blankface", "iziard"];

        async function fetchBlueprints() {
            const { data, error } = await supabaseClient
                .from('blueprints')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                document.getElementById('mainGrid').innerText = "Error: " + error.message;
                return;
            }
            renderGrid(data);
        }

        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            data.forEach(item => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                let dotHtml = "";
                friends.forEach(f => {
                    const isActive = item[f] === true;
                    dotHtml += `<div class="dot ${f} ${isActive ? 'active' : ''}" 
                                     onclick="toggleStatus(${item.id}, '${f}', ${isActive})" 
                                     title="${f}"></div>`;
                });

                cell.innerHTML = `
                    <div class="id-label">#${item.id}</div>
                    <div class="img-box">
                        <img src="icons/${item.id}.png" class="blueprint-img" onerror="this.src='icons/placeholder.png'">
                    </div>
                    <div class="dots">${dotHtml}</div>
                    <div class="item-label">${item.name}</div>
                `;
                grid.appendChild(cell);
            });
        }

        async function toggleStatus(id, friend, currentVal) {
            const { error } = await supabaseClient
                .from('blueprints')
                .update({ [friend]: !currentVal })
                .eq('id', id);

            if (error) {
                alert("Update failed: " + error.message);
            } else {
                fetchBlueprints(); // Refresh UI
            }
        }

        fetchBlueprints();
        async function updateIntelligenceTimestamp() {
    const repo = "beerschris/arcraiders-friendtracker";
    const statusElement = document.getElementById('last-updated');

    try {
        // Fetch the latest commit from the main branch
        const response = await fetch(`https://api.github.com/repos/${repo}/commits/main`);
        
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.json();
        const commitDate = new Date(data.commit.author.date);

        // Format the date to look clean (e.g., Apr 22, 9:05 PM)
        const formattedDate = commitDate.toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        statusElement.innerText = "Intelligence Last Synced: " + formattedDate;
        statusElement.style.opacity = "1"; // Make it visible once loaded
    } catch (error) {
        console.error("GitHub API Error:", error);
        statusElement.innerText = "Intelligence Sync: Offline";
    }
}

// Call it when the page loads
updateIntelligenceTimestamp();
    </script>
    <footer style="margin-top: 50px; padding: 20px; border-top: 1px solid #30363d; width: 100%; text-align: center;">
    <div id="last-updated" style="font-size: 11px; color: var(--gold); opacity: 0; transition: opacity 0.5s;">
        Syncing with GitHub...
    </div>
</footer>
</body>
</html>
